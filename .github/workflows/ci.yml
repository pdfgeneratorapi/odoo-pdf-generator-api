name: CI

on:
  pull_request:
    branches: [master, main, "18.0", "19.0"]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff + pylint-odoo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev tooling
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pylint (pylint-odoo)
        # lint-pylint invokes Odoo's pylint plugin. Odoo itself isn't in the
        # venv (runs in docker in local dev), but pyproject.toml disables
        # import-error / no-name-in-module so the plugin still works.
        run: make lint-pylint

  unit-tests:
    name: Host unit tests + host coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev tooling
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest tests_unit -v

      - name: Host coverage (unit only — does not block on the full 95% gate)
        # The 95% gate in pyproject [tool.coverage.report] applies to combined
        # host+Odoo coverage. Running Odoo in CI needs a docker-in-docker
        # harness which is a follow-up (see ci-odoo job below, currently
        # behind a continue-on-error flag).
        run: uv run coverage run -m pytest tests_unit && uv run coverage report --fail-under=0

  i18n-check:
    name: msgfmt validates every .po
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gettext

      - name: Validate .po files
        run: make i18n-check
