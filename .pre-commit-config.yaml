repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: coverage
        name: tests + coverage (>=95%)
        entry: make coverage
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true
